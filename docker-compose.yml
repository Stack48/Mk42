services:
  postgres:
    image: postgres:16-alpine
    container_name: mk42_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mk42_dev
    command:
      - /bin/sh
      - -c
      - |
        docker-entrypoint.sh postgres &
        pid=$$!

        # Attendre sur la base "postgres" (toujours disponible) et non sur "mk42_dev"
        until pg_isready -U "$${POSTGRES_USER:-postgres}" -d postgres; do
          sleep 1
        done

        # Créer la base mk42_dev si elle n'existe pas (volume existant d'une ancienne exécution)
        psql -U "$${POSTGRES_USER:-postgres}" -d postgres \
          -tc "SELECT 1 FROM pg_database WHERE datname='mk42_dev'" | grep -q 1 || \
          psql -U "$${POSTGRES_USER:-postgres}" -d postgres \
            -c "CREATE DATABASE mk42_dev;"

        # Créer le rôle mk42 si nécessaire
        psql -U "$${POSTGRES_USER:-postgres}" -d postgres \
          -tc "SELECT 1 FROM pg_roles WHERE rolname='mk42'" | grep -q 1 || \
          psql -v ON_ERROR_STOP=1 -U "$${POSTGRES_USER:-postgres}" -d postgres \
            -c "CREATE ROLE mk42 LOGIN PASSWORD 'mk42password';"

        # Configurer le rôle et les droits sur la base (connexion via postgres)
        psql -v ON_ERROR_STOP=1 -U "$${POSTGRES_USER:-postgres}" -d postgres \
          -c "ALTER ROLE mk42 WITH LOGIN CREATEDB PASSWORD 'mk42password';" \
          -c "ALTER DATABASE mk42_dev OWNER TO mk42;" \
          -c "GRANT ALL PRIVILEGES ON DATABASE mk42_dev TO mk42;"

        # Droits sur le schéma public (nécessite une connexion à mk42_dev)
        psql -v ON_ERROR_STOP=1 -U "$${POSTGRES_USER:-postgres}" -d mk42_dev \
          -c "GRANT ALL ON SCHEMA public TO mk42;" \
          -c "ALTER SCHEMA public OWNER TO mk42;"

        wait $$pid
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'psql -U postgres -d mk42_dev -tAc "SELECT 1 FROM pg_roles WHERE rolname=''mk42''" | grep -q 1']
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mk42_app
    ports:
      - '3000:3000'
      - '5555:5555'
    volumes:
      - .:/app
      - mk42_node_modules:/app/node_modules
    env_file:
      - .env.local
    environment:
      # Écrase .env.local pour utiliser le hostname du container postgres
      DATABASE_URL: 'postgresql://mk42:mk42password@postgres:5432/mk42_dev?schema=public'
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mk42_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - '5050:80'
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mk42_node_modules:
